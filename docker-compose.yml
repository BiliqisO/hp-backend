services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hafsahsplace
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Override DB_URL to use the service name instead of localhost
      DB_URL: jdbc:postgresql://db:5432/hafsahsplace
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
