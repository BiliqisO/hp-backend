spring.application.name=hafsahs-place

# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hafsahsplace}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT Configuration
jwt.secret=${JWT_SECRET:LtwbVlMBQanSidCDjNBr5jGzbHgWyxJkBT6owp392Fa}
jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dhiwfue0h}
cloudinary.api-key=${CLOUDINARY_API_KEY:367257657539216}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:DOBkQjKQ09yrWgDZ6Cq9gKM1skE}

# Paystack Configuration
paystack.secret-key=${PAYSTACK_SECRET_KEY:sk_test_cb667511239a10fe836fb12886f236ef5b4d1f8b}
paystack.public-key=${PAYSTACK_PUBLIC_KEY:pk_test_583d00faa8b99f23cbf4ceb414a9b866f2cab5a8}
paystack.api-url=${PAYSTACK_API_URL:https://api.paystack.co}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@hafsahsplace.com}
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Rate Limiting (enforced in RateLimitFilter — values here for documentation only)
# login:          10 attempts / 15 minutes per IP
# register:       20 attempts / 1 hour per IP
# forgot-password: 5 attempts / 1 hour per IP

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173}
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
cors.exposed-headers=Authorization,Content-Type
cors.allow-credentials=true
cors.max-age=3600

# Logging Configuration
logging.level.com.biliqis.hafsahs_place=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.cors=DEBUG
logging.level.org.aspectj=DEBUG

# Log file configuration
logging.file.name=logs/hafsahs-place.log
logging.file.max-size=10MB
logging.file.max-history=30

# Log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Separate loggers for different concerns
logging.level.AUDIT_LOG=INFO
logging.level.ERROR_LOG=ERROR
logging.level.PERFORMANCE_LOG=INFO
